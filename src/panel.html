<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Performance IQ</title><link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}:root{--blue:#0B60EA;--blue-h:#0950C8;--bg:#F5F7FA;--card:#fff;--border:#E2E8F0;--text:#1A202C;--muted:#64748B;--light:#94A3B8;--red:#EF4444;--r:8px}html,body{width:360px;background:transparent;font-family:"Open Sans",-apple-system,sans-serif;font-size:13px;color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none}.panel{width:360px;background:var(--bg);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08);border:1px solid var(--border);display:flex;flex-direction:column;max-height:580px}.hdr{background:var(--blue);padding:12px 14px;-webkit-app-region:drag;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:12px 12px 0 0}.hl{display:flex;align-items:center;gap:8px}.lw{width:26px;height:26px;background:rgba(255,255,255,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.li{width:14px;height:14px}.ht{color:#fff;font-weight:700;font-size:13px}.hs{color:rgba(255,255,255,.75);font-size:11px;margin-top:1px}.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0;-webkit-app-region:no-drag}.dot.idle{background:#4ADE80}.dot.rec{background:#F87171;animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}.datebar{background:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}.dl{font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}.dd{font-size:11px;color:var(--muted);font-weight:500}.meetings{overflow-y:auto;flex:1;padding:8px}.meetings::-webkit-scrollbar{width:4px}.meetings::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}.empty{padding:32px 16px;text-align:center;color:var(--muted)}.ei{font-size:24px;margin-bottom:8px}.et{font-weight:600;color:var(--text);margin-bottom:3px;font-size:13px}.nocal{padding:24px 16px;text-align:center}.nocal p{color:var(--muted);font-size:12px;margin-bottom:12px;line-height:1.5}.cbtn{background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-app-region:no-drag}.cbtn:hover{background:var(--blue-h)}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;transition:border-color .15s,box-shadow .15s}.card:hover{box-shadow:0 1px 4px rgba(0,0,0,.06)}.card.is-rec{border-color:#FCA5A5;background:#FFF8F8}.card.is-skip{opacity:.5}.card.is-past{opacity:.45}.cr{display:flex;align-items:flex-start;gap:10px}.tc{min-width:52px;flex-shrink:0}.ct{font-size:11px;font-weight:700;color:var(--blue);line-height:1.3}.cd{font-size:10px;color:var(--light);margin-top:1px}.ci{flex:1;min-width:0}.cn{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}.ca{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;display:inline-flex;align-items:center;gap:3px}.br{background:#FEE2E2;color:#DC2626}.bs{background:#F1F5F9;color:#64748B}.bd{background:#DCFCE7;color:#15803D}.rdot{width:5px;height:5px;border-radius:50%;background:#DC2626;animation:pulse 1s infinite;display:inline-block}.actions{display:flex;gap:5px;margin-top:8px;-webkit-app-region:no-drag}.btn{flex:1;padding:5px 0;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .12s;font-family:inherit}.btn-r{background:var(--blue);color:#fff}.btn-r:hover{background:var(--blue-h)}.btn-s{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-s:hover{background:var(--bg);color:var(--text)}.now{display:flex;align-items:center;gap:6px;margin:5px 0 3px;font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px}.now::before,.now::after{content:'';flex:1;height:1px;background:var(--red);opacity:.2}.footer{background:#fff;border-top:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:0 0 12px 12px;-webkit-app-region:no-drag}.fb{font-size:11px;color:var(--blue);cursor:pointer;font-weight:600;background:none;border:none;padding:0;font-family:inherit}.fb:hover{text-decoration:underline}.fr{display:flex;align-items:center;gap:10px}.ver{font-size:10px;color:var(--light)}.sw{padding:28px;text-align:center}.sp{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}.lt{color:var(--muted);font-size:12px}@keyframes spin{to{transform:rotate(360deg)}}.err{padding:24px 16px;text-align:center}</style></head><body><div class="panel"><div class="hdr"><div class="hl"><div class="lw"><svg class="li" viewBox="0 0 24 24" fill="none"><rect x="1" y="14" width="4" height="8" rx="1" fill="white"/><rect x="7" y="9" width="4" height="13" rx="1" fill="white" opacity=".85"/><rect x="13" y="4" width="4" height="18" rx="1" fill="white" opacity=".7"/><rect x="19" y="10" width="4" height="12" rx="1" fill="white" opacity=".55"/></svg></div><div><div class="ht">Performance IQ</div><div class="hs" id="sub">Loading...</div></div></div><div class="dot" id="dot"></div></div><div class="datebar"><div class="dl">Today</div><div class="dd" id="ds"></div></div><div class="meetings" id="list"><div class="sw"><div class="sp"></div><div class="lt">Fetching calendar...</div></div></div><div class="footer"><button class="fb" id="db">Open Dashboard &rarr;</button><div class="fr"><button class="fb" id="sb">Settings</button><span class="ver" id="ver">v1.0</span></div></div></div><script>
const list=document.getElementById("list"),sub=document.getElementById("sub"),dot=document.getElementById("dot");
document.getElementById("ds").textContent=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
document.getElementById("db").onclick=()=>window.pi.openDashboard();
document.getElementById("sb").onclick=()=>window.pi.openSettings();
let events=[],recs=new Set(),skips=new Set(),calOk=true;
const fmt=iso=>new Date(iso).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
const dur=(s,e)=>{const m=Math.round((new Date(e)-new Date(s))/6e4);return m<60?m+"m":Math.floor(m/60)+"h"+(m%60?" "+(m%60)+"m":"")};
const names=a=>(a||[]).filter(x=>!x.self).map(x=>x.displayName||x.email.split("@")[0]).slice(0,2).join(", ");
const isPast=e=>new Date(e.end)<new Date();
const isNow=e=>{const n=new Date();return new Date(e.start)<=n&&n<=new Date(e.end)};
function setStatus(s){dot.className="dot";if(s==="idle")dot.classList.add("idle");else if(s==="recording")dot.classList.add("rec");else if(s==="meeting-detected")dot.classList.add("idle")}
function render(){
  if(!calOk){
    list.innerHTML='<div class="nocal"><p>Connect Google Calendar in the web app to see your meetings here.</p><button class="cbtn" id="cc">Connect Calendar</button></div>';
    const cc=document.getElementById("cc");if(cc)cc.onclick=()=>window.pi.openSettings();
    sub.textContent="Calendar not connected";return;
  }
  if(!events.length){list.innerHTML='<div class="empty"><div class="ei">\uD83C\uDF89</div><div class="et">No meetings today</div><div>Enjoy the focus time!</div></div>';sub.textContent="No meetings today";return}
  const now=new Date();let html="",nd=false;
  events.forEach((ev,i)=>{
    const past=isPast(ev),cur=isNow(ev),rec=recs.has(ev.id),skip=skips.has(ev.id);
    if(!nd&&!past&&new Date(ev.start)>now){if(i>0)html+='<div class="now">Now</div>';nd=true}
    let cls="card";if(cur&&rec)cls+=" is-rec";else if(skip)cls+=" is-skip";else if(past)cls+=" is-past";
    let badge="";
    if(cur&&rec)badge='<span class="badge br"><span class="rdot"></span>Recording</span>';
    else if(skip)badge='<span class="badge bs">Skipped</span>';
    else if(past)badge='<span class="badge bd">Done</span>';
    let act="";
    if(!past){
      if(rec)act=`<div class="actions"><button class="btn btn-s" data-id="${ev.id}" data-a="stop">Stop Recording</button></div>`;
      else if(skip)act=`<div class="actions"><button class="btn btn-r" data-id="${ev.id}" data-a="r">Record Instead</button></div>`;
      else act=`<div class="actions"><button class="btn btn-r" data-id="${ev.id}" data-a="r">&#9679; Record</button><button class="btn btn-s" data-id="${ev.id}" data-a="s">Skip</button></div>`;
    }
    const att=names(ev.attendees);const evTitle=ev.title||ev.summary||"Untitled meeting";
    html+=`<div class="${cls}"><div class="cr"><div class="tc"><div class="ct">${fmt(ev.start)}</div><div class="cd">${dur(ev.start,ev.end)}</div></div><div class="ci"><div class="cn" title="${evTitle}">${evTitle}</div>${att?`<div class="ca">with ${att}</div>`:""}</div>${badge?`<div style="flex-shrink:0;margin-left:4px">${badge}</div>`:""}</div>${act}</div>`;
  });
  list.innerHTML=html;
  list.querySelectorAll("[data-a]").forEach(b=>{
    b.onclick=async()=>{const id=b.dataset.id,a=b.dataset.a;
      const ev=events.find(e=>e.id===id);
      if(a==="r"){
        recs.add(id);skips.delete(id);
        if(ev){await window.pi.startRecording(ev)}else{window.pi.recordMeeting(id)}
      } else if(a==="stop"){
        await window.pi.stopRecording(id);
        recs.delete(id);
      } else{
        skips.add(id);recs.delete(id);window.pi.skipMeeting(id)
      }
      render()};
  });
  const next=events.find(e=>!isPast(e));
  if(next){const m=Math.round((new Date(next.start)-now)/6e4);const nTitle=next.title||next.summary||"Meeting";
    if(isNow(next))sub.textContent="In meeting \u2014 "+nTitle;
    else if(m<=60)sub.textContent="Next in "+m+"m \u2014 "+nTitle.substring(0,22);
    else sub.textContent=events.length+" meeting"+(events.length>1?"s":"")+" today";
  }else sub.textContent="All done for today";
}
async function init(){
  try{const d=await window.pi.getEvents();events=d.events||[];calOk=d.calendarConnected!==false;render()}
  catch(e){list.innerHTML='<div class="err"><div style="font-size:20px;color:#EF4444;margin-bottom:8px">\u26a0</div><div class="et">Could not load</div><div style="font-size:11px;color:#64748B;margin-top:4px">Try reconnecting in Settings</div></div>';sub.textContent="Error"}
  try{const s=await window.pi.getStatus();setStatus(s)}catch{}
}
window.pi.onEventsUpdated(ev=>{events=ev;render()});
window.pi.onStatusChanged(s=>setStatus(s));
setInterval(render,60000);
window.pi.getVersion().then(v => { document.getElementById('ver').textContent = 'v' + v; });
init();
</script></body></html>
